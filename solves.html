<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova Timer - Solves</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main>

        <h1>Recent Solves</h1>

        <div id="solveList"></div>

        <br>

        <button onclick="window.location.href='index.html'">
            ← Back
        </button>

    </main>

    <script>

        const solveList = document.getElementById("solveList");

        const solves = JSON.parse(sessionStorage.getItem("solves")) || [];

        solves.slice().reverse().forEach((time) => {

            const div = document.createElement("div");

            div.className = "solve";

            div.textContent = time;

            solveList.appendChild(div);

        });

    </script>

</body>

</html>
