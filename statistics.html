<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Statistics</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="statistics">

    <h1>📊 Statistics</h1>

    <div class="stat">
        <span>Current Solve</span>
        <strong id="currentSolve">-</strong>
    </div>

    <div class="stat">
        <span>Best Solve</span>
        <strong id="bestSolve">-</strong>
    </div>

    <div class="stat">
        <span>Worst Solve</span>
        <strong id="worstSolve">-</strong>
    </div>

    <div class="stat">
        <span>Average</span>
        <strong id="averageSolve">-</strong>
    </div>

    <div class="stat">
        <span>Number of Solves</span>
        <strong id="solveCount">0</strong>
    </div>

    <div class="stat">
        <span>Best Ao5</span>
        <strong id="bestAo5">-</strong>
    </div>

    <div class="stat">
        <span>Best Ao12</span>
        <strong id="bestAo12">-</strong>
    </div>

    <button onclick="location.href='index.html'">
        ← Back to Timer
    </button>

</div>

<script src="js/statistics.js"></script>

</body>

</html>
